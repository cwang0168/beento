name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: beento
          POSTGRES_PASSWORD: beento
          POSTGRES_DB: beento
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U beento"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://beento:beento@localhost:5432/beento
      JWT_SECRET: ci-jwt-secret
      CRON_SECRET: ci-cron-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Test
        run: npm test

      - name: Build Docker image
        run: docker build -t beento-backend:ci .
